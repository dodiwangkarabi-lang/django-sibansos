{% extends "layouts/base.html" %}

{% block content %}
<div>
    <h1>Dashboard Admin</h1>
    <p>{{ request.user.username }}</p>
</div>

<div>
    <h2>Daftar Pengajuan</h2>
    {% for pengajuan in daftar_pengajuan %}
        <p>
            {{ pengajuan.masyarakat.nama }} | 
            {{ pengajuan.bantuan.nama }} | 
            <strong>
                {{ pengajuan.status }}
            </strong>
            <a href="{% url 'pengajuan_detail' pengajuan.id %}">detail</a>
        </p>
    {% endfor %}
</div>


{% endblock %}
